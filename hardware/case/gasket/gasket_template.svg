<text x="22.00" y="230.40" font-size="2.3" font-family="DejaVu Sans, Arial, sans-serif" text-anchor="start" font-weight="normal" fill="#666">  grey outline = band ledge ring (reference)   grey dashed = board edge</text>
<text x="22.00" y="234.60" font-size="2.3" font-family="DejaVu Sans, Arial, sans-serif" text-anchor="start" font-weight="normal" fill="#666">  pink circle = corner-cap / socket keep-out   blue = USB aperture keep-out</text>
<text x="22.00" y="238.80" font-size="2.3" font-family="DejaVu Sans, Arial, sans-serif" text-anchor="start" font-weight="normal" fill="#333">  10 segments: W&#215;3 E&#215;3 (y 25/50/75) + N&#215;2 S&#215;2 (x 24.9/59.3); ~180 mm&#178; foam total.</text>
