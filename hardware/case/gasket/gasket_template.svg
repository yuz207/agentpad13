<text x="95.00" y="12.00" font-size="4.6" font-family="DejaVu Sans, Arial, sans-serif" text-anchor="middle" font-weight="bold" fill="#111">agentpad13 v2 — optional PORON ledge-gasket kit</text>
<text x="95.00" y="18.50" font-size="2.5" font-family="DejaVu Sans, Arial, sans-serif" text-anchor="middle" font-weight="normal" fill="#555">1:1 cutting template &#183; derived from band rabbet-ledge constants &#183; NO geometry change</text>
<text x="95.00" y="24.80" font-size="2.5" font-family="DejaVu Sans, Arial, sans-serif" text-anchor="middle" font-weight="normal" fill="#555">Material: 0.5 mm PORON foam, 3M 468/9471-class adhesive back &#183; 10 segments &#183; 15 &#215; 1.2 mm each</text>
<text x="95.00" y="30.60" font-size="2.3" font-family="DejaVu Sans, Arial, sans-serif" text-anchor="middle" font-weight="normal" fill="#777">Stick to the BAND ledge underside (z +0.3); 0.5 into 0.3 = 40% compression (PORON 20-50% band). OPTIONAL — bare ledge is already the 0.3 mm backstop.</text>
